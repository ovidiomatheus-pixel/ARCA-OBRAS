<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arca Obras</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a2e;font-size:14px}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--green:#3B6D11;--green-light:#EAF3DE;--amber:#854F0B;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;--border:#e0e0e0;--bg:#f4f5f7;--card:#fff;--text:#1a1a2e;--text2:#666;--text3:#999}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-logo .title{font-size:15px;font-weight:600;color:#fff}
.sidebar-logo .sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.nav-section{font-size:10px;font-weight:600;color:rgba(255,255,255,0.35);padding:14px 16px 4px;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:rgba(255,255,255,0.65);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-item.active{color:#fff;border-left-color:#378ADD;background:rgba(55,138,221,0.15)}
.nav-item svg{width:16px;height:16px;opacity:.7}
.nav-item.active svg{opacity:1}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.topbar-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.content{padding:16px;flex:1;overflow-y:auto}
select,input[type=text],input[type=number],input[type=date],input[type=time]{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);outline:none;font-family:inherit}
select:focus,input:focus{border-color:var(--blue)}
.btn{font-size:12px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s}
.btn:hover{background:#f0f0f0}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0C447C}
.btn-danger{background:var(--red-light);color:var(--red);border-color:#F7C1C1}
.btn-success{background:var(--green-light);color:var(--green);border-color:#C0DD97}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.metric{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600}
.metric-sub{font-size:11px;margin-top:2px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-gray{background:#f1f1f1;color:#555}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{font-size:12px;padding:8px 14px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.worker-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap}
.worker-row:last-child{border-bottom:none}
.present-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:#f4f5f7;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:16px}
.present-btn.on{background:var(--green-light);border-color:#97C459}
.worker-info{min-width:120px}
.worker-name{font-size:13px;font-weight:600}
.worker-func{font-size:11px;color:var(--text2)}
.emp-block{margin-bottom:16px}
.emp-hd{display:flex;align-items:center;justify-content:space-between;background:#f8f9fa;border-radius:8px;padding:9px 12px;margin-bottom:8px}
.emp-nome{font-size:13px;font-weight:600}
.emp-total{font-size:13px;font-weight:600;color:var(--blue)}
.total-linha{display:flex;justify-content:space-between;padding:10px 0 0;border-top:1px solid var(--border);margin-top:4px}
.relatorio-box{background:#f8f9fa;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;white-space:pre-wrap;line-height:1.7;font-family:monospace;max-height:340px;overflow-y:auto;margin-bottom:8px;color:var(--text)}
.copy-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;margin-bottom:12px;font-family:inherit;transition:all .15s}
.copy-btn:hover{background:#f0f0f0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:var(--text2);font-weight:500}
.modal-wrap{background:rgba(0,0,0,0.4);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;min-height:280px;margin-bottom:12px}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:440px;border:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:600;margin-bottom:14px}
.alert-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f0f0f0}
.alert-row:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-red{background:#E24B4A}
.dot-amber{background:#EF9F27}
.dot-green{background:#639922}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px}
.semana-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.semana-label{font-size:13px;font-weight:600;color:var(--text)}
input[type=number]{width:65px}
input[type=time]{width:88px}
.servico-input{flex:1;min-width:100px}
@media(max-width:600px){
  .sidebar{display:none}
  .mobile-nav{display:flex}
  .form-grid{grid-template-columns:1fr}
  .worker-row{gap:4px}
  input[type=time]{width:76px}
  input[type=number]{width:55px}
}
.mobile-nav{display:none;background:#1a1a2e;padding:8px 0;overflow-x:auto;gap:0}
.mobile-tab{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:10px;border:none;background:none;font-family:inherit}
.mobile-tab.active{color:#fff}
.mobile-tab svg{width:20px;height:20px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="title">🏗 Arca Obras</div>
      <div class="sub">Gestão de obras</div>
    </div>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" onclick="goTo('diario')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Diário do dia
    </div>
    <div class="nav-item" onclick="goTo('semana')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
      Resumo semana
    </div>
    <div class="nav-item" onclick="goTo('relatorio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Relatório sexta
    </div>
    <div class="nav-section">Config</div>
    <div class="nav-item" onclick="goTo('cadastro')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Empreiteiros
    </div>
  </div>

  <div class="main">
    <nav class="mobile-nav" id="mobile-nav">
      <button class="mobile-tab active" onclick="goTo('diario')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Diário
      </button>
      <button class="mobile-tab" onclick="goTo('semana')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
        Semana
      </button>
      <button class="mobile-tab" onclick="goTo('relatorio')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Relatório
      </button>
      <button class="mobile-tab" onclick="goTo('cadastro')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Cadastros
      </button>
    </nav>

    <div class="topbar">
      <span class="topbar-title" id="page-title">Diário do dia</span>
      <div class="topbar-right" id="topbar-right"></div>
    </div>

    <div class="content" id="content"></div>
  </div>
</div>

<script>
const OBRAS = ['Anápolis City S-84','Alphaville P-14','Alphaville S-8','Alphaville M-5','Morumbi','Anaville','Sun Flower','Condomínio Harã'];

let db = JSON.parse(localStorage.getItem('arca_db') || 'null') || {
  empreiteiros: [
    {id:1,nome:'DIVINO',funcao:'Pedreiro mestre',pix:'62 99233-8601',titular:'Divino Hermínio França da Silva',tipoPix:'telefone',
      equipe:[{id:11,nome:'DIVINO',funcao:'Pedreiro mestre',diaria:300},{id:12,nome:'ROGGER',funcao:'Pedreiro',diaria:200},{id:13,nome:'RICARDO',funcao:'Pedreiro',diaria:200},{id:14,nome:'ALTEMIR',funcao:'Ajudante',diaria:130}]},
    {id:2,nome:'MAURO',funcao:'Assentador piso',pix:'50a5a4aa-b521-4883-a887-bca756563180',titular:'Mauro Evangelista de Oliveira',tipoPix:'chave',
      equipe:[{id:21,nome:'MAURO',funcao:'Assentador',diaria:350},{id:22,nome:'MAURÍCIO',funcao:'Ajudante assentador',diaria:220}]},
    {id:3,nome:'LUÍS',funcao:'Pintor',pix:'',titular:'Luís Silva',tipoPix:'chave',
      equipe:[{id:31,nome:'LUÍS',funcao:'Pintor',diaria:250}]},
  ],
  registros:[],
  nextId:100
};

function salvarDB(){ localStorage.setItem('arca_db', JSON.stringify(db)); }

function today(){ return new Date().toISOString().slice(0,10); }

function fmtData(d){ return d ? d.split('-').reverse().join('/') : ''; }

function semanaAtual(){
  const now = new Date();
  const day = now.getDay();
  const diff = day===0 ? -6 : 1-day;
  const seg = new Date(now); seg.setDate(now.getDate()+diff);
  const sex = new Date(seg); sex.setDate(seg.getDate()+4);
  return {ini:seg.toISOString().slice(0,10), fim:sex.toISOString().slice(0,10)};
}

let currentView = 'diario';

function goTo(view){
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+view+"'"));
  });
  document.querySelectorAll('.mobile-tab').forEach((el,i)=>{
    const views=['diario','semana','relatorio','cadastro'];
    el.classList.toggle('active', views[i]===view);
  });
  const titles={diario:'Diário do dia',semana:'Resumo da semana',relatorio:'Relatório semanal',cadastro:'Empreiteiros e equipes'};
  document.getElementById('page-title').textContent = titles[view]||view;
  if(view==='diario') renderDiario();
  else if(view==='semana') renderSemana();
  else if(view==='relatorio') renderRelatorio();
  else if(view==='cadastro') renderCadastro();
}

function renderDiario(){
  const sw = semanaAtual();
  document.getElementById('topbar-right').innerHTML = `
    <select id="sel-obra" onchange="renderDiarioContent()">
      <option value="">Selecione a obra</option>
      ${OBRAS.map(o=>`<option>${o}</option>`).join('')}
    </select>
    <input type="date" id="sel-data" value="${today()}" onchange="renderDiarioContent()">
    <button class="btn btn-primary" onclick="salvarDia()">💾 Salvar</button>
  `;
  document.getElementById('content').innerHTML = '<div id="diario-body"><div class="empty">Selecione a obra e a data.</div></div>';
}

function renderDiarioContent(){
  const obra = document.getElementById('sel-obra').value;
  const data = document.getElementById('sel-data').value;
  if(!obra||!data){document.getElementById('diario-body').innerHTML='<div class="empty">Selecione a obra e a data.</div>';return;}
  let html='';
  db.empreiteiros.forEach(emp=>{
    html+=`<div class="emp-block">
      <div class="emp-hd">
        <span class="emp-nome">👷 ${emp.nome} — ${emp.funcao}</span>
        <span class="emp-total" id="t-${emp.id}">R$ 0,00</span>
      </div>`;
    emp.equipe.forEach(w=>{
      const key=`${obra}|${data}|${emp.id}|${w.id}`;
      const reg=db.registros.find(r=>r.key===key)||{presente:false,entrada:'07:00',saida:'17:00',diaria:w.diaria,fracao:1,servico:''};
      const dis=reg.presente?'':'opacity:.35;pointer-events:none';
      html+=`<div class="worker-row">
        <div class="present-btn ${reg.presente?'on':''}" onclick="toggleP('${obra}','${data}',${emp.id},${w.id})" title="Marcar/desmarcar presença">${reg.presente?'✓':'○'}</div>
        <div class="worker-info"><div class="worker-name">${w.nome}</div><div class="worker-func">${w.funcao}</div></div>
        <div style="${dis};display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <input type="time" value="${reg.entrada}" id="e-${emp.id}-${w.id}" onchange="calcF(${emp.id},${w.id})">
          <input type="time" value="${reg.saida}" id="s-${emp.id}-${w.id}" onchange="calcF(${emp.id},${w.id})">
          <span style="font-size:11px;color:var(--text2)">fração:</span>
          <input type="number" step="0.5" min="0" max="3" value="${reg.fracao}" id="f-${emp.id}-${w.id}" onchange="updT(${emp.id})">
          <span style="font-size:11px;color:var(--text2)">R$</span>
          <input type="number" step="10" min="0" value="${reg.diaria}" id="d-${emp.id}-${w.id}" onchange="updT(${emp.id})">
          <input type="text" class="servico-input" placeholder="Serviço..." value="${reg.servico}" id="sv-${emp.id}-${w.id}">
        </div>
      </div>`;
    });
    html+=`<div style="margin-top:6px;display:flex;justify-content:space-between;align-items:center">
      <button class="btn" onclick="addAvulso(${emp.id})">+ trabalhador avulso</button>
      <div class="total-linha" style="border:none;padding:0"><span style="font-size:12px;color:var(--text2)">Total ${emp.nome}:</span><span class="emp-total" id="t-${emp.id}" style="font-size:13px;font-weight:600;color:var(--blue);margin-left:8px">R$ 0,00</span></div>
    </div></div>`;
  });
  document.getElementById('diario-body').innerHTML=html;
  db.empreiteiros.forEach(emp=>updT(emp.id));
}

function toggleP(obra,data,empId,wId){
  const key=`${obra}|${data}|${empId}|${wId}`;
  let reg=db.registros.find(r=>r.key===key);
  if(!reg){
    const emp=db.empreiteiros.find(e=>e.id===empId);
    const w=emp.equipe.find(x=>x.id===wId);
    reg={key,obra,data,empId,wId,nome:w.nome,funcao:w.funcao,presente:false,entrada:'07:00',saida:'17:00',diaria:w.diaria,fracao:1,servico:''};
    db.registros.push(reg);
  }
  reg.presente=!reg.presente;
  salvarDB();
  renderDiarioContent();
}

function calcF(empId,wId){
  const e=document.getElementById('e-'+empId+'-'+wId);
  const s=document.getElementById('s-'+empId+'-'+wId);
  if(!e||!s) return;
  const [eh,em]=e.value.split(':').map(Number);
  const [sh,sm]=s.value.split(':').map(Number);
  let mins=(sh*60+sm)-(eh*60+em)-60;
  if(mins<0) mins=0;
  let frac=Math.round((mins/60)/9*4)/4;
  if(frac>2) frac=2;
  document.getElementById('f-'+empId+'-'+wId).value=frac;
  updT(empId);
}

function updT(empId){
  const emp=db.empreiteiros.find(e=>e.id===empId);
  if(!emp) return;
  let total=0;
  emp.equipe.forEach(w=>{
    const f=document.getElementById('f-'+empId+'-'+w.id);
    const d=document.getElementById('d-'+empId+'-'+w.id);
    if(f&&d) total+=parseFloat(f.value||0)*parseFloat(d.value||0);
  });
  document.querySelectorAll('#t-'+empId).forEach(el=>el.textContent='R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2}));
}

function addAvulso(empId){
  const nome=prompt('Nome:'); if(!nome) return;
  const func=prompt('Função:')||'Ajudante';
  const d=parseFloat(prompt('Diária (R$):')||'130');
  const emp=db.empreiteiros.find(e=>e.id===empId);
  emp.equipe.push({id:db.nextId++,nome:nome.toUpperCase(),funcao:func,diaria:d,temp:true});
  salvarDB();
  renderDiarioContent();
}

function salvarDia(){
  const obra=document.getElementById('sel-obra')?.value;
  const data=document.getElementById('sel-data')?.value;
  if(!obra||!data){alert('Selecione obra e data.');return;}
  db.empreiteiros.forEach(emp=>{
    emp.equipe.forEach(w=>{
      const key=`${obra}|${data}|${emp.id}|${w.id}`;
      const f=document.getElementById('f-'+emp.id+'-'+w.id);
      const d=document.getElementById('d-'+emp.id+'-'+w.id);
      const sv=document.getElementById('sv-'+emp.id+'-'+w.id);
      const e=document.getElementById('e-'+emp.id+'-'+w.id);
      const s=document.getElementById('s-'+emp.id+'-'+w.id);
      if(!f) return;
      const fracao=parseFloat(f.value||0);
      let reg=db.registros.find(r=>r.key===key);
      if(!reg){
        reg={key,obra,data,empId:emp.id,wId:w.id,nome:w.nome,funcao:w.funcao,presente:fracao>0,entrada:'07:00',saida:'17:00',diaria:w.diaria,fracao:0,servico:''};
        db.registros.push(reg);
      }
      reg.presente=fracao>0;
      reg.fracao=fracao;
      reg.diaria=parseFloat(d?.value||w.diaria);
      reg.servico=sv?.value||'';
      reg.entrada=e?.value||'07:00';
      reg.saida=s?.value||'17:00';
    });
  });
  salvarDB();
  const btn=document.querySelector('.btn-primary');
  if(btn){btn.textContent='✓ Salvo!';setTimeout(()=>btn.textContent='💾 Salvar',1500);}
}

function renderSemana(){
  const sw=semanaAtual();
  document.getElementById('topbar-right').innerHTML=`
    <select id="sw-obra" onchange="renderSemanaContent()">
      <option value="todas">Todas as obras</option>
      ${OBRAS.map(o=>`<option>${o}</option>`).join('')}
    </select>
    <input type="date" id="sw-ini" value="${sw.ini}">
    <input type="date" id="sw-fim" value="${sw.fim}">
    <button class="btn btn-primary" onclick="renderSemanaContent()">🔍 Filtrar</button>
  `;
  document.getElementById('content').innerHTML='<div id="semana-body"><div class="empty">Selecione a obra e clique em filtrar.</div></div>';
}

function renderSemanaContent(){
  const obra=document.getElementById('sw-obra')?.value||'todas';
  const ini=document.getElementById('sw-ini')?.value;
  const fim=document.getElementById('sw-fim')?.value;
  let regs=db.registros.filter(r=>r.presente&&r.fracao>0);
  if(obra!=='todas') regs=regs.filter(r=>r.obra===obra);
  if(ini) regs=regs.filter(r=>r.data>=ini);
  if(fim) regs=regs.filter(r=>r.data<=fim);
  if(!regs.length){document.getElementById('semana-body').innerHTML='<div class="empty">Nenhum registro no período.</div>';return;}
  const byObraEmp={};
  regs.forEach(r=>{const k=r.obra+'||'+r.empId; if(!byObraEmp[k]) byObraEmp[k]=[]; byObraEmp[k].push(r);});
  let html='';
  Object.keys(byObraEmp).forEach(k=>{
    const [obraK,empId]=k.split('||');
    const emp=db.empreiteiros.find(e=>e.id==empId);
    if(!emp) return;
    const recs=byObraEmp[k];
    const byW={};
    recs.forEach(r=>{if(!byW[r.nome]) byW[r.nome]={diaria:r.diaria,total:0,funcao:r.funcao,servico:r.servico,dias:[]}; byW[r.nome].total+=r.fracao*r.diaria; byW[r.nome].dias.push(fmtData(r.data)+' ('+r.fracao+'x)');});
    const totalEmp=Object.values(byW).reduce((s,w)=>s+w.total,0);
    html+=`<div class="card"><div class="card-hd"><span class="card-title">👷 ${obraK} — ${emp.nome}</span><span style="font-weight:600;color:var(--blue)">R$ ${totalEmp.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>`;
    Object.keys(byW).forEach(nome=>{
      const w=byW[nome];
      const totFrac=w.dias.map(d=>parseFloat(d.match(/\(([\d.]+)x\)/)?.[1]||0)).reduce((a,b)=>a+b,0);
      html+=`<div class="worker-row"><div class="worker-info"><div class="worker-name">${nome}</div><div class="worker-func">${w.funcao}</div></div><div style="flex:1;font-size:11px;color:var(--text2)">${w.dias.join(' | ')}</div><div style="font-weight:600;white-space:nowrap">R$ ${w.total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('semana-body').innerHTML=html;
}

function renderRelatorio(){
  const sw=semanaAtual();
  document.getElementById('topbar-right').innerHTML=`
    <select id="rel-obra"><option value="todas">Todas as obras</option>${OBRAS.map(o=>`<option>${o}</option>`).join('')}</select>
    <input type="date" id="rel-ini" value="${sw.ini}">
    <input type="date" id="rel-fim" value="${sw.fim}">
    <button class="btn btn-primary" onclick="gerarRel()">📄 Gerar</button>
  `;
  document.getElementById('content').innerHTML='<div id="rel-body"><div class="empty">Configure o período e clique em Gerar.</div></div>';
}

function gerarRel(){
  const obra=document.getElementById('rel-obra').value;
  const ini=document.getElementById('rel-ini').value;
  const fim=document.getElementById('rel-fim').value;
  const iniFmt=fmtData(ini); const fimFmt=fmtData(fim);
  let regs=db.registros.filter(r=>r.presente&&r.fracao>0&&r.data>=ini&&r.data<=fim);
  if(obra!=='todas') regs=regs.filter(r=>r.obra===obra);
  if(!regs.length){document.getElementById('rel-body').innerHTML='<div class="empty">Nenhum registro no período selecionado.</div>';return;}
  const byObraEmp={};
  regs.forEach(r=>{const k=r.obra+'||'+r.empId; if(!byObraEmp[k]) byObraEmp[k]=[]; byObraEmp[k].push(r);});
  let html='';
  Object.keys(byObraEmp).forEach(k=>{
    const [obraK,empId]=k.split('||');
    const emp=db.empreiteiros.find(e=>e.id==empId);
    if(!emp) return;
    const recs=byObraEmp[k];
    const byW={};
    recs.forEach(r=>{if(!byW[r.nome]) byW[r.nome]={diaria:r.diaria,total:0,funcao:r.funcao,servico:r.servico,fracoes:[]}; byW[r.nome].fracoes.push(r.fracao); byW[r.nome].total+=r.fracao*r.diaria; if(r.servico&&!byW[r.nome].servico) byW[r.nome].servico=r.servico;});
    const totalEmp=Object.values(byW).reduce((s,w)=>s+w.total,0);
    let linhas='';
    Object.keys(byW).forEach(nome=>{
      const w=byW[nome];
      const totFrac=w.fracoes.reduce((a,b)=>a+b,0);
      linhas+=`• ${nome} — ${totFrac} DIÁRIA — R$ ${w.diaria.toLocaleString('pt-BR',{minimumFractionDigits:2})} → R$ ${w.total.toLocaleString('pt-BR',{minimumFractionDigits:2})}${w.servico?' ('+w.servico.toUpperCase()+')':''}\n`;
    });
    const pixLine=emp.tipoPix==='boleto'?'BOLETO DE PAGAMENTO':`PIX (${emp.tipoPix}): ${emp.pix}\nTitular: ${emp.titular}`;
    const txt=`📑 Relatório Vale Semanal\n📅 Período: ${iniFmt} a ${fimFmt}\n🏗 OBRA: ${obraK.toUpperCase()}\n👷‍♂ Empreiteiro: ${emp.nome}\n🔹 Diárias/serviços da semana:\n${linhas}💰 Valor TOTAL a Pagar: R$ ${totalEmp.toLocaleString('pt-BR',{minimumFractionDigits:2})}\n📌 Dados para pagamento:\n${pixLine}`;
    const enc=btoa(unescape(encodeURIComponent(txt)));
    html+=`<div style="margin-bottom:18px"><div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">${obraK} — ${emp.nome}</div><div class="relatorio-box">${txt}</div><button class="copy-btn" onclick="copiar(this,'${enc}')">📋 Copiar para WhatsApp</button></div>`;
  });
  document.getElementById('rel-body').innerHTML=html;
}

function copiar(btn,enc){
  const txt=decodeURIComponent(escape(atob(enc)));
  navigator.clipboard.writeText(txt).then(()=>{btn.textContent='✓ Copiado!';setTimeout(()=>btn.textContent='📋 Copiar para WhatsApp',2000);});
}

function renderCadastro(){
  document.getElementById('topbar-right').innerHTML=`<button class="btn btn-primary" onclick="novoEmp()">+ Novo empreiteiro</button>`;
  renderListaEmpr();
}

function renderListaEmpr(){
  let html='<div id="modal-area"></div>';
  db.empreiteiros.forEach(emp=>{
    html+=`<div class="card"><div class="card-hd"><span class="card-title">👷 ${emp.nome} — ${emp.funcao}</span><div style="display:flex;gap:6px"><button class="btn" onclick="addW(${emp.id})">+ trabalhador</button><button class="btn btn-danger" onclick="delEmp(${emp.id})">🗑</button></div></div>`;
    html+=`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">PIX (${emp.tipoPix}): ${emp.pix||'—'} | ${emp.titular}</div>`;
    emp.equipe.forEach(w=>{
      html+=`<div class="worker-row"><div class="worker-info"><div class="worker-name">${w.nome}</div><div class="worker-func">${w.funcao}</div></div><div style="font-size:12px;font-weight:600;color:var(--blue);min-width:80px">R$ ${w.diaria.toLocaleString('pt-BR',{minimumFractionDigits:2})}/dia</div><button class="btn btn-danger" style="padding:4px 8px" onclick="delW(${emp.id},${w.id})">🗑</button></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('content').innerHTML=html||'<div class="empty">Nenhum empreiteiro cadastrado.</div>';
}

function novoEmp(){
  const m=document.createElement('div');
  m.id='modal-wrap';
  m.innerHTML=`<div class="modal-wrap"><div class="modal"><div class="modal-title">Novo empreiteiro</div><div class="form-grid"><div class="form-group"><label>Nome</label><input id="mn" placeholder="Ex: DIVINO"></div><div class="form-group"><label>Função</label><input id="mf" placeholder="Ex: Pedreiro mestre"></div><div class="form-group"><label>Chave PIX</label><input id="mp" placeholder="CPF, telefone, chave..."></div><div class="form-group"><label>Tipo PIX</label><select id="mt"><option value="chave">Chave aleatória</option><option value="telefone">Telefone</option><option value="cpf">CPF</option><option value="cnpj">CNPJ</option><option value="boleto">Boleto</option></select></div><div class="form-group" style="grid-column:span 2"><label>Titular</label><input id="mtit" placeholder="Nome completo ou razão social"></div><div class="form-group"><label>Diária padrão (R$)</label><input id="md" type="number" value="200"></div></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="document.getElementById('modal-wrap').remove()">Cancelar</button><button class="btn btn-primary" onclick="saveEmp()">Salvar</button></div></div></div>`;
  document.getElementById('content').prepend(m);
}

function saveEmp(){
  const nome=document.getElementById('mn').value.toUpperCase();
  if(!nome){alert('Informe o nome.');return;}
  const funcao=document.getElementById('mf').value;
  const pix=document.getElementById('mp').value;
  const tipoPix=document.getElementById('mt').value;
  const titular=document.getElementById('mtit').value;
  const diaria=parseFloat(document.getElementById('md').value||200);
  const newId=db.nextId++;
  db.empreiteiros.push({id:newId,nome,funcao,pix,titular,tipoPix,equipe:[{id:db.nextId++,nome,funcao,diaria}]});
  salvarDB();
  document.getElementById('modal-wrap')?.remove();
  renderListaEmpr();
}

function addW(empId){
  const nome=prompt('Nome:'); if(!nome) return;
  const func=prompt('Função:')||'Ajudante';
  const d=parseFloat(prompt('Diária (R$):')||'130');
  db.empreiteiros.find(e=>e.id===empId).equipe.push({id:db.nextId++,nome:nome.toUpperCase(),funcao:func,diaria:d});
  salvarDB(); renderListaEmpr();
}

function delEmp(id){if(!confirm('Remover empreiteiro?')) return; db.empreiteiros=db.empreiteiros.filter(e=>e.id!==id); salvarDB(); renderListaEmpr();}
function delW(empId,wId){const emp=db.empreiteiros.find(e=>e.id===empId); emp.equipe=emp.equipe.filter(w=>w.id!==wId); salvarDB(); renderListaEmpr();}

goTo('diario');
</script>
